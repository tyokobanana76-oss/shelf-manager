<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>棚管理システム｜吉岡テクニカル</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<style>
  :root {
    --bg:#0a0c10;--panel:#111520;--border:#1e2a3a;
    --accent:#00c8ff;--accent2:#ff6b35;--text:#e0eaf5;
    --text-dim:#5a7080;--success:#00e676;--warn:#ffb300;--danger:#ff3d3d;
    --c0:#ff6b35;--c1:#607d8b;--c2:#00c8ff;--c3:#7c4dff;--c4:#00e676;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;overflow-x:hidden;}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,200,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,200,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
  .container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:12px;}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--panel);border:1px solid var(--border);border-left:3px solid var(--accent);margin-bottom:12px;}
  .header-title{font-size:13px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;}
  .header-sub{font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-top:2px;}
  .clock{font-size:18px;color:var(--accent);letter-spacing:2px;font-weight:bold;}
  .tabs{display:flex;gap:4px;margin-bottom:12px;}
  .tab{flex:1;padding:10px 8px;background:var(--panel);border:1px solid var(--border);color:var(--text-dim);font-family:'Courier New',monospace;font-size:11px;letter-spacing:1px;cursor:pointer;text-align:center;transition:all 0.2s;text-transform:uppercase;}
  .tab.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,255,0.05);}
  .panel{background:var(--panel);border:1px solid var(--border);padding:16px;margin-bottom:12px;}
  .panel-title{font-size:10px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .scan-btn{width:100%;padding:20px;background:transparent;border:2px solid var(--accent);color:var(--accent);font-family:'Courier New',monospace;font-size:14px;letter-spacing:3px;cursor:pointer;text-transform:uppercase;transition:all 0.2s;margin-bottom:12px;}
  .scan-btn.scanning{border-color:var(--warn);color:var(--warn);animation:pulse 1s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
  #camera-container{display:none;width:100%;aspect-ratio:4/3;background:#000;border:1px solid var(--border);position:relative;overflow:hidden;margin-bottom:12px;}
  #camera-container.active{display:block;}
  #interactive{width:100%;height:100%;}
  #interactive video{width:100%;height:100%;object-fit:cover;}
  #interactive canvas{position:absolute;top:0;left:0;width:100%;height:100%;}
  .camera-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;}
  .scan-line{width:70%;height:2px;background:var(--accent);box-shadow:0 0 10px var(--accent);animation:scanline 2s ease-in-out infinite;}
  @keyframes scanline{0%,100%{transform:translateY(-40px);opacity:0.3}50%{transform:translateY(40px);opacity:1}}
  .stop-btn{width:100%;padding:12px;background:transparent;border:1px solid var(--danger);color:var(--danger);font-family:'Courier New',monospace;font-size:12px;letter-spacing:2px;cursor:pointer;margin-bottom:12px;}
  .input-row{display:flex;gap:8px;margin-bottom:12px;}
  .manual-input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Courier New',monospace;font-size:14px;padding:12px;outline:none;letter-spacing:1px;}
  .manual-input:focus{border-color:var(--accent);}
  .submit-btn{padding:12px 20px;background:var(--accent);border:none;color:var(--bg);font-family:'Courier New',monospace;font-size:12px;font-weight:bold;letter-spacing:2px;cursor:pointer;}
  .order-card{background:var(--bg);border:1px solid var(--border);padding:16px;margin-bottom:12px;display:none;}
  .order-card.active{display:block;}
  .order-no{font-size:20px;color:var(--accent);letter-spacing:2px;margin-bottom:8px;}
  .order-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
  .info-item label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;display:block;}
  .info-item span{font-size:14px;color:var(--text);}
  .shelf-location{padding:16px;text-align:center;border:2px solid;margin-bottom:12px;}
  .shelf-location.new{border-color:var(--accent2);background:rgba(255,107,53,0.05);}
  .shelf-location.found{border-color:var(--success);background:rgba(0,230,118,0.05);}
  .shelf-label{font-size:10px;letter-spacing:3px;margin-bottom:4px;}
  .shelf-code{font-size:40px;font-weight:bold;letter-spacing:4px;}
  .shelf-desc{font-size:11px;color:var(--text-dim);margin-top:4px;}
  .action-btns{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .action-btn{flex:1;padding:14px;border:1px solid;background:transparent;font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;min-width:120px;}
  .action-btn.register{border-color:var(--accent2);color:var(--accent2);}
  .action-btn.complete{border-color:var(--success);color:var(--success);}
  .action-btn:active{opacity:0.7;}
  .reg-select{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Courier New',monospace;font-size:12px;padding:10px;outline:none;}
  .shelf-wrapper{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .shelf-grid{display:grid;grid-template-columns:64px repeat(10,minmax(44px,1fr));gap:3px;min-width:540px;}
  .shelf-header{font-size:8px;text-align:center;padding:4px 2px;letter-spacing:0.5px;line-height:1.4;}
  .shelf-header.type-overdue{color:var(--danger);}
  .shelf-header.type-past{color:var(--text-dim);}
  .shelf-header.type-today{color:var(--warn);font-weight:bold;}
  .shelf-header.type-future{color:var(--text-dim);}
  .shelf-cat-label{font-size:7px;padding:4px 2px;display:flex;align-items:center;border-left:3px solid;padding-left:4px;line-height:1.3;word-break:keep-all;}
  .shelf-cell{background:var(--bg);border:1px solid var(--border);padding:3px 2px;min-height:46px;cursor:pointer;transition:all 0.15s;}
  .shelf-cell:active{opacity:0.7;}
  .shelf-cell.has-items{border-color:var(--accent);}
  .shelf-cell.type-overdue{background:rgba(255,61,61,0.04);border-color:rgba(255,61,61,0.2);}
  .shelf-cell.type-overdue.has-items{border-color:var(--danger);}
  .shelf-cell.type-today{background:rgba(255,179,0,0.04);}
  .shelf-cell.type-today.has-items{border-color:var(--warn);}
  .shelf-cell.highlighted{border-color:var(--accent2);background:rgba(255,107,53,0.15);animation:hl 0.4s ease;}
  @keyframes hl{0%{transform:scale(1.06)}100%{transform:scale(1)}}
  .cell-count{font-size:14px;font-weight:bold;text-align:center;color:var(--text-dim);}
  .cell-count.has{color:var(--accent);}
  .cell-count.overdue{color:var(--danger);}
  .cell-count.today{color:var(--warn);}
  .cell-items{font-size:6px;color:var(--text-dim);line-height:1.3;margin-top:2px;}
  .legend{display:flex;gap:16px;padding:8px 12px;background:var(--panel);border:1px solid var(--border);margin-bottom:12px;flex-wrap:wrap;align-items:center;}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:10px;}
  .legend-dot{width:8px;height:8px;border-radius:50%;}
  .reload-btn{padding:8px 16px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Courier New',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;margin-left:auto;}
  .shelf-status{font-size:10px;color:var(--text-dim);margin-bottom:8px;}
  .log-list{list-style:none;max-height:300px;overflow-y:auto;}
  .log-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:11px;display:flex;gap:8px;align-items:flex-start;}
  .log-time{color:var(--text-dim);white-space:nowrap;font-size:10px;}
  .log-content{flex:1;}
  .log-badge{font-size:9px;padding:2px 6px;border:1px solid;white-space:nowrap;}
  .log-badge.in{border-color:var(--accent2);color:var(--accent2);}
  .log-badge.out{border-color:var(--success);color:var(--success);}
  .log-badge.del{border-color:var(--danger);color:var(--danger);}
  .gs-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:'Courier New',monospace;font-size:12px;padding:10px;outline:none;margin-bottom:8px;}
  .gs-input:focus{border-color:var(--accent);}
  .gs-btn{padding:10px 20px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Courier New',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--panel);border:1px solid var(--accent);color:var(--accent);padding:12px 24px;font-size:12px;letter-spacing:1px;z-index:1000;opacity:0;transition:opacity 0.3s;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}
  .toast.show{opacity:1;}
  .toast.error{border-color:var(--danger);color:var(--danger);}
  .toast.success{border-color:var(--success);color:var(--success);}
  .page{display:none;}
  .page.active{display:block;}
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;}
  .modal-box{background:var(--panel);border:1px solid var(--border);padding:20px;width:100%;max-width:400px;max-height:80vh;overflow-y:auto;}
  .modal-title{font-size:10px;letter-spacing:3px;color:var(--text-dim);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .modal-item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .modal-item-no{font-size:12px;color:var(--text);}
  .modal-item-date{font-size:10px;color:var(--text-dim);}
  .del-btn{background:transparent;border:1px solid var(--danger);color:var(--danger);font-family:'Courier New',monospace;font-size:10px;padding:4px 10px;cursor:pointer;}
  .modal-close{width:100%;margin-top:12px;padding:12px;background:transparent;border:1px solid var(--text-dim);color:var(--text-dim);font-family:'Courier New',monospace;font-size:11px;cursor:pointer;}
</style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <div class="header-title">棚管理システム</div>
      <div class="header-sub">吉岡テクニカル / 溶接部門</div>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </header>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('scan',this)">スキャン</button>
    <button class="tab" onclick="switchTab('shelf',this)">棚ビュー</button>
    <button class="tab" onclick="switchTab('log',this)">ログ</button>
    <button class="tab" onclick="switchTab('settings',this)">設定</button>
  </div>

  <div class="page active" id="page-scan">
    <div class="panel">
      <div class="panel-title">バーコードスキャン</div>
      <button class="scan-btn" id="scan-btn" onclick="toggleCamera()">📷 カメラでスキャン</button>
      <div id="camera-container">
        <div id="interactive"></div>
        <div class="camera-overlay"><div class="scan-line"></div></div>
      </div>
      <button class="stop-btn" id="stop-btn" style="display:none" onclick="stopCamera()">■ スキャン停止</button>
      <div class="input-row">
        <input class="manual-input" id="manual-input" type="text" placeholder="受注No. 手動入力..." maxlength="20" onkeydown="if(event.key==='Enter') processOrderNo()">
        <button class="submit-btn" onclick="processOrderNo()">検索</button>
      </div>
    </div>
    <div class="order-card" id="order-card">
      <div class="order-no" id="result-orderno"></div>
      <div class="order-info">
        <div class="info-item"><label>品名</label><span id="result-name">-</span></div>
        <div class="info-item"><label>カテゴリ</label><span id="result-cat">-</span></div>
        <div class="info-item"><label>仮付け日</label><span id="result-date">-</span></div>
        <div class="info-item"><label>状態</label><span id="result-status">-</span></div>
      </div>
      <div class="shelf-location" id="shelf-location">
        <div class="shelf-label" id="shelf-label">棚位置</div>
        <div class="shelf-code" id="shelf-code">--</div>
        <div class="shelf-desc" id="shelf-desc"></div>
      </div>
      <div class="action-btns" id="action-btns"></div>
    </div>
  </div>

  <div class="page" id="page-shelf">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--danger)"></div><span style="color:var(--danger)">遅延</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--warn)"></div><span style="color:var(--warn)">今日</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div><span>予定</span></div>
      <button class="reload-btn" onclick="loadShelfFromGS()">🔄 更新</button>
    </div>
    <div class="shelf-status" id="shelf-status"></div>
    <div class="panel">
      <div class="panel-title">棚マップ　← 横スクロール　タップで詳細/削除</div>
      <div class="shelf-wrapper">
        <div class="shelf-grid" id="shelf-grid"></div>
      </div>
    </div>
  </div>

  <div class="page" id="page-log">
    <div class="panel">
      <div class="panel-title">操作ログ</div>
      <ul class="log-list" id="log-list"><li class="log-item" style="color:var(--text-dim)">ログなし</li></ul>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="panel">
      <div class="panel-title">Googleスプレッドシート連携</div>
      <input class="gs-input" id="gs-url" type="url" placeholder="Apps Script WebアプリURL">
      <button class="gs-btn" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// カテゴリは配列インデックスで管理（0〜4）
const CATS = [
  {id:'blast', label:'ブラスト',     color:'var(--c0)'},
  {id:'iron',  label:'鉄',           color:'var(--c1)'},
  {id:'hontai',label:'ホンタイ',     color:'var(--c2)'},
  {id:'frame', label:'フレーム\nホンタイ', color:'var(--c3)'},
  {id:'sus',   label:'SUS',          color:'var(--c4)'},
];

// 列は配列インデックスで管理（0〜9）
const COLS = [
  {key:'overdue',type:'overdue'},
  {key:'-1',     type:'past'},
  {key:'0',      type:'today'},
  {key:'1',      type:'future'},
  {key:'2',      type:'future'},
  {key:'3',      type:'future'},
  {key:'4',      type:'future'},
  {key:'5',      type:'future'},
  {key:'6',      type:'future'},
  {key:'7',      type:'future'},
];

// ShelfCodeは配列インデックスベースで生成（A-E × 1-10）
function getShelfCode(catIdx, colIdx) {
  return String.fromCharCode(65 + catIdx) + (colIdx + 1);
}

function catIdToIdx(catId) {
  return CATS.findIndex(c => c.id === catId);
}

function catLabelToIdx(label) {
  return CATS.findIndex(c => c.label === label || c.label.replace('\n','') === label);
}

function colKeyToIdx(key) {
  return COLS.findIndex(c => c.key === key);
}

function getToday(){const d=new Date();return new Date(d.getFullYear(),d.getMonth(),d.getDate());}
function offsetToDate(offset){const d=getToday();d.setDate(d.getDate()+offset);return d;}
function formatMD(date){return `${date.getMonth()+1}/${date.getDate()}`;}

function getColHeaderHTML(col){
  if(col.key==='overdue') return '遅延<br>以前';
  const offset=parseInt(col.key);
  const md=formatMD(offsetToDate(offset));
  const lbl=offset===-1?'前日':offset===0?'今日':offset===1?'明日':offset===2?'明後日':`+${offset}日`;
  return `${md}<br><span style="font-size:7px">${lbl}</span>`;
}

function dateToColKey(dateStr){
  if(!dateStr) return null;
  const parts=dateStr.split('/');
  if(parts.length<2) return null;
  const today=getToday();
  const target=new Date(today.getFullYear(),parseInt(parts[0])-1,parseInt(parts[1]));
  const diff=Math.round((target-today)/86400000);
  if(diff<-1) return 'overdue';
  if(diff>7) return '7';
  return String(diff);
}

function getCatLabel(catId){
  const cat=CATS.find(c=>c.id===catId);
  return cat ? cat.label.replace('\n','') : catId;
}

// カテゴリ日本語→ID変換
const CAT_JP_TO_ID = {
  'ブラスト':'blast','鉄':'iron','ホンタイ':'hontai',
  'フレームホンタイ':'frame','フレーム\nホンタイ':'frame','SUS':'sus'
};

function catLabelToId(label){
  return CAT_JP_TO_ID[label] || label;
}

let gsUrl=localStorage.getItem('gsUrl')||'';
let shelfData={};
let localData=JSON.parse(localStorage.getItem('localData')||'{}');
let logs=JSON.parse(localStorage.getItem('shelfLogs')||'[]');
let scanning=false;
let currentOrder=null;

function updateClock(){
  const n=new Date();
  document.getElementById('clock').textContent=
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
}
setInterval(updateClock,1000);updateClock();

function switchTab(tab,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  el.classList.add('active');
  if(tab==='shelf') loadShelfFromGS();
  if(tab==='log') renderLog();
  if(tab==='settings') renderSettings();
}

async function loadShelfFromGS(){
  const statusEl=document.getElementById('shelf-status');
  if(!gsUrl){
    statusEl.textContent='GS未設定 - 設定タブでURLを登録してください';
    renderShelfGrid();
    return;
  }
  statusEl.textContent='読み込み中...';
  try{
    const res=await fetch(`${gsUrl}?action=getAll`);
    const data=await res.json();
    if(data.success && data.orders){
      shelfData={};
      data.orders.forEach(o=>{
        const catId=catLabelToId(o.category)||o.category;
        shelfData[o.orderNo]={...o, category:catId};
      });
      const now=new Date();
      statusEl.textContent=`最終更新: ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')} （${data.orders.length}件）`;
    } else {
      statusEl.textContent='データなし';
    }
  }catch(e){
    statusEl.textContent='GS取得エラー';
    console.warn('GS fetch error:',e);
  }
  renderShelfGrid();
}

function toggleCamera(){scanning?stopCamera():startCamera();}

function startCamera(){
  document.getElementById('camera-container').classList.add('active');
  const btn=document.getElementById('scan-btn');
  btn.classList.add('scanning');btn.textContent='📷 スキャン中...';
  document.getElementById('stop-btn').style.display='block';
  scanning=true;
  Quagga.init({
    inputStream:{name:'Live',type:'LiveStream',target:document.getElementById('interactive'),
      constraints:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}},
    decoder:{readers:['code_128_reader','code_39_reader','ean_reader']},
    locate:true,
  },err=>{
    if(err){showToast('カメラエラー: '+err.message,'error');stopCamera();return;}
    Quagga.start();
  });
  Quagga.onDetected(result=>{
    const code=result.codeResult.code;
    if(code){stopCamera();document.getElementById('manual-input').value=code;processOrderNo(code);}
  });
}

function stopCamera(){
  Quagga.stop();scanning=false;
  document.getElementById('camera-container').classList.remove('active');
  const btn=document.getElementById('scan-btn');
  btn.classList.remove('scanning');btn.textContent='📷 カメラでスキャン';
  document.getElementById('stop-btn').style.display='none';
}

async function processOrderNo(forceNo){
  const orderNo=forceNo||document.getElementById('manual-input').value.trim();
  if(!orderNo){showToast('受注No.を入力してください','error');return;}
  let order=shelfData[orderNo]||localData[orderNo];
  if(!order && gsUrl){
    showToast('データ取得中...','');
    try{
      const res=await fetch(`${gsUrl}?action=get&orderNo=${encodeURIComponent(orderNo)}`);
      const data=await res.json();
      if(data.success && data.order){
        const catId=catLabelToId(data.order.category)||data.order.category;
        order={...data.order, category:catId};
        shelfData[orderNo]=order;
      }
    }catch(e){showToast('GS接続エラー（オフラインで継続）','error');}
  }
  if(!order) order={orderNo,name:'',category:'',date:'',shelfCode:'',status:'new'};
  currentOrder=order;
  renderOrderCard(order);
}

function renderOrderCard(order){
  document.getElementById('order-card').classList.add('active');
  document.getElementById('result-orderno').textContent=order.orderNo;
  document.getElementById('result-name').textContent=order.name||'（未登録）';
  document.getElementById('result-cat').textContent=getCatLabel(order.category)||'（未設定）';
  document.getElementById('result-date').textContent=order.date||'（未設定）';
  const loc=document.getElementById('shelf-location');
  const code=document.getElementById('shelf-code');
  const desc=document.getElementById('shelf-desc');
  const label=document.getElementById('shelf-label');
  const statusEl=document.getElementById('result-status');
  const btns=document.getElementById('action-btns');
  const st=order.status;

  if(st==='new'||st===''||!st){
    statusEl.textContent='新規';statusEl.style.color='var(--accent2)';
    loc.className='shelf-location new';
    label.textContent='事前配布を登録';
    code.textContent='未登録';code.style.color='var(--accent2)';
    desc.textContent='カテゴリと仮付け日を選んで登録';
    const dateOpts=COLS.map(col=>{
      let lbl;
      if(col.key==='overdue') lbl='遅延以前';
      else if(col.key==='-1') lbl=`前日 ${formatMD(offsetToDate(-1))}`;
      else if(col.key==='0') lbl=`今日 ${formatMD(offsetToDate(0))}`;
      else lbl=`${formatMD(offsetToDate(parseInt(col.key)))} (+${col.key}日)`;
      return `<option value="${col.key}">${lbl}</option>`;
    }).join('');
    btns.innerHTML=`
      <select class="reg-select" id="cat-select">
        <option value="">カテゴリ選択...</option>
        ${CATS.map(c=>`<option value="${c.id}">${c.label.replace('\n','')}</option>`).join('')}
      </select>
      <select class="reg-select" id="date-select">${dateOpts}</select>
      <button class="action-btn register" onclick="registerOrder()">棚に登録</button>
    `;
    if(order.date){const ck=dateToColKey(order.date);if(ck)document.getElementById('date-select').value=ck;}
    if(order.category){document.getElementById('cat-select').value=order.category;}

  }else if(st==='registered'||st==='事前配布済'){
    statusEl.textContent='事前配布済';statusEl.style.color='var(--accent)';
    loc.className='shelf-location new';
    label.textContent='棚位置';
    code.textContent=order.shelfCode;code.style.color='var(--accent2)';
    desc.textContent=`${getCatLabel(order.category)} / 仮付け ${order.date}`;
    btns.innerHTML=`<button class="action-btn complete" onclick="completeOrder()" style="flex:1">✓ 前工程到着 → 突き合わせ完了</button>`;
    highlightShelfCell(order.shelfCode);

  }else{
    statusEl.textContent='突き合わせ完了';statusEl.style.color='var(--success)';
    loc.className='shelf-location found';
    label.textContent='突き合わせ済み';
    code.textContent=order.shelfCode;code.style.color='var(--success)';
    desc.textContent=`完了 ${order.completedAt||''}`;
    btns.innerHTML='';
  }
}

function registerOrder(){
  const catId=document.getElementById('cat-select').value;
  const colKey=document.getElementById('date-select').value;
  if(!catId){showToast('カテゴリを選択してください','error');return;}

  // インデックスベースでShelfCode生成
  const catIdx=catIdToIdx(catId);
  const colIdx=colKeyToIdx(colKey);
  const shelfCode=getShelfCode(catIdx, colIdx);

  const dateLabel=colKey==='overdue'?'遅延以前':formatMD(offsetToDate(parseInt(colKey)));
  currentOrder.category=catId;
  currentOrder.date=currentOrder.date||dateLabel;
  currentOrder.shelfCode=shelfCode;
  currentOrder.status='registered';
  currentOrder.registeredAt=new Date().toLocaleTimeString('ja-JP');
  shelfData[currentOrder.orderNo]=currentOrder;
  localData[currentOrder.orderNo]=currentOrder;
  saveLocal();
  syncToGS('register',currentOrder);
  addLog('in',currentOrder.orderNo,shelfCode,getCatLabel(catId),currentOrder.date);
  renderOrderCard(currentOrder);
  showToast(`棚 ${shelfCode} に登録しました`,'success');
}

function completeOrder(){
  currentOrder.status='completed';
  currentOrder.completedAt=new Date().toLocaleTimeString('ja-JP');
  shelfData[currentOrder.orderNo]=currentOrder;
  delete localData[currentOrder.orderNo];
  saveLocal();
  syncToGS('complete',currentOrder);
  addLog('out',currentOrder.orderNo,currentOrder.shelfCode,getCatLabel(currentOrder.category),currentOrder.date);
  renderOrderCard(currentOrder);
  showToast('突き合わせ完了！','success');
}

function renderShelfGrid(){
  const grid=document.getElementById('shelf-grid');
  grid.innerHTML='';

  // ヘッダー行
  grid.innerHTML+='<div class="shelf-header"></div>';
  COLS.forEach(col=>{
    grid.innerHTML+=`<div class="shelf-header type-${col.type}">${getColHeaderHTML(col)}</div>`;
  });

  // カテゴリ×列（インデックスベース）
  CATS.forEach((cat, catIdx)=>{
    grid.innerHTML+=`<div class="shelf-cat-label" style="border-color:${cat.color};color:${cat.color}">${cat.label}</div>`;
    COLS.forEach((col, colIdx)=>{
      const code=getShelfCode(catIdx, colIdx);
      const items=getShelfItems(code);
      const count=items.length;
      const countClass=count>0?(col.type==='overdue'?'overdue':col.type==='today'?'today':'has'):'';
      const colorStyle=count>0&&!['overdue','today'].includes(col.type)?`color:${cat.color}`:'';
      grid.innerHTML+=`
        <div class="shelf-cell type-${col.type} ${count>0?'has-items':''}" id="cell-${code}" onclick="showCellDetail('${code}')">
          <div class="cell-count ${countClass}" style="${colorStyle}">${count||'－'}</div>
          <div class="cell-items">${items.slice(0,3).map(o=>o.orderNo.slice(-4)).join('<br>')}</div>
        </div>`;
    });
  });
}

function getShelfItems(code){
  return Object.values(shelfData).filter(o=>
    o.shelfCode===code && (o.status==='registered'||o.status==='事前配布済')
  );
}

function highlightShelfCell(code){
  setTimeout(()=>{
    const cell=document.getElementById('cell-'+code);
    if(cell){cell.classList.add('highlighted');setTimeout(()=>cell.classList.remove('highlighted'),2000);}
  },300);
}

function showCellDetail(code){
  const items=getShelfItems(code);
  if(items.length===0){showToast(`${code}：空き`,'');return;}
  const list=items.map(o=>`
    <div class="modal-item">
      <div>
        <div class="modal-item-no">${o.orderNo}</div>
        <div class="modal-item-date">${getCatLabel(o.category)} / ${o.date}</div>
      </div>
      <button class="del-btn" onclick="deleteOrder('${o.orderNo}')">削除</button>
    </div>
  `).join('');
  const modal=document.createElement('div');
  modal.className='modal-overlay';
  modal.id='cell-modal';
  modal.innerHTML=`
    <div class="modal-box">
      <div class="modal-title">棚 ${code}（${items.length}件）</div>
      ${list}
      <button class="modal-close" onclick="document.getElementById('cell-modal').remove()">閉じる</button>
    </div>
  `;
  document.body.appendChild(modal);
}

async function deleteOrder(orderNo){
  if(!confirm(`${orderNo} を棚から削除しますか？`)) return;
  const order=shelfData[orderNo]||localData[orderNo];
  delete shelfData[orderNo];
  delete localData[orderNo];
  saveLocal();
  document.getElementById('cell-modal')?.remove();
  addLog('del',orderNo,order?.shelfCode||'',getCatLabel(order?.category||''),order?.date||'');
  renderShelfGrid();
  showToast(`${orderNo} を削除しました`,'success');
  if(gsUrl){
    try{
      const params=new URLSearchParams({action:'delete',orderNo});
      await fetch(`${gsUrl}?${params.toString()}`,{method:'GET',mode:'no-cors',redirect:'follow'});
    }catch(e){console.warn('GS delete failed:',e);}
  }
}

function addLog(type,orderNo,shelf,cat,date){
  const n=new Date();
  logs.unshift({type,orderNo,shelf,cat,date,time:`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}`});
  if(logs.length>200) logs.pop();
  localStorage.setItem('shelfLogs',JSON.stringify(logs));
}

function renderLog(){
  const list=document.getElementById('log-list');
  if(!logs.length){list.innerHTML='<li class="log-item" style="color:var(--text-dim)">ログなし</li>';return;}
  list.innerHTML=logs.map(l=>`
    <li class="log-item">
      <span class="log-time">${l.time}</span>
      <div class="log-content">
        <div>${l.orderNo}</div>
        <div style="color:var(--text-dim);font-size:9px">${l.cat} / ${l.date} / 棚${l.shelf}</div>
      </div>
      <span class="log-badge ${l.type}">${l.type==='in'?'事前登録':l.type==='out'?'完了':'削除'}</span>
    </li>`).join('');
}

function renderSettings(){document.getElementById('gs-url').value=gsUrl;}

function saveSettings(){
  gsUrl=document.getElementById('gs-url').value.trim();
  localStorage.setItem('gsUrl',gsUrl);
  showToast('保存しました','success');
}

async function syncToGS(action,order){
  if(!gsUrl) return;
  try{
    const params=new URLSearchParams({
      action,orderNo:order.orderNo||'',name:order.name||'',
      category:order.category||'',date:order.date||'',
      shelfCode:order.shelfCode||'',status:order.status||'',
      registeredAt:order.registeredAt||'',completedAt:order.completedAt||''
    });
    await fetch(`${gsUrl}?${params.toString()}`,{method:'GET',mode:'no-cors',redirect:'follow'});
  }catch(e){console.warn('GS sync failed:',e);}
}

function saveLocal(){localStorage.setItem('localData',JSON.stringify(localData));}

function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(type?' '+type:'');
  clearTimeout(window._tt);
  window._tt=setTimeout(()=>t.classList.remove('show'),3000);
}
</script>
</body>
</html>
